<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 智慧新零售云POS综合管理平台</title>
    <link rel="stylesheet" href="pos-common.css">
    <style>
        /* Login Page Specific Styles */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #389e0d 0%, #52c41a 30%, #73d13d 60%, #95de64 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated background shapes */
        .login-page::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.08) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(255,255,255,0.06) 0%, transparent 40%),
                        radial-gradient(circle at 80% 20%, rgba(255,255,255,0.04) 0%, transparent 30%);
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(2deg); }
            66% { transform: translate(-20px, 20px) rotate(-1deg); }
        }

        /* Floating particles */
        .login-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: particleFloat linear infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-duration: 15s; animation-delay: 0s; width: 8px; height: 8px; }
        .particle:nth-child(2) { left: 20%; animation-duration: 18s; animation-delay: 2s; width: 4px; height: 4px; }
        .particle:nth-child(3) { left: 35%; animation-duration: 12s; animation-delay: 4s; width: 10px; height: 10px; }
        .particle:nth-child(4) { left: 50%; animation-duration: 16s; animation-delay: 1s; width: 6px; height: 6px; }
        .particle:nth-child(5) { left: 65%; animation-duration: 14s; animation-delay: 3s; width: 5px; height: 5px; }
        .particle:nth-child(6) { left: 80%; animation-duration: 20s; animation-delay: 5s; width: 8px; height: 8px; }
        .particle:nth-child(7) { left: 90%; animation-duration: 13s; animation-delay: 2.5s; width: 4px; height: 4px; }
        .particle:nth-child(8) { left: 45%; animation-duration: 17s; animation-delay: 6s; width: 7px; height: 7px; }

        @keyframes particleFloat {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(720deg); opacity: 0; }
        }

        .login-container {
            position: relative;
            z-index: 10;
            width: 420px;
            max-width: 92vw;
            animation: slideUp 0.6s ease;
        }

        .login-card {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15), 0 0 0 1px rgba(255,255,255,0.1);
            overflow: hidden;
        }

        .login-header {
            padding: 40px 40px 24px;
            text-align: center;
        }

        .login-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #52c41a, #389e0d);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(82, 196, 26, 0.3);
        }

        .login-logo svg {
            width: 36px;
            height: 36px;
            fill: #ffffff;
        }

        .login-title {
            font-size: 22px;
            font-weight: 700;
            color: #262626;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .login-subtitle {
            font-size: 13px;
            color: #8c8c8c;
            letter-spacing: 0.5px;
        }

        .login-body {
            padding: 8px 40px 32px;
        }

        .login-form-group {
            margin-bottom: 22px;
        }

        .login-form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #595959;
            margin-bottom: 8px;
        }

        .login-input-wrapper {
            position: relative;
        }

        .login-input-wrapper .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #bfbfbf;
            font-size: 16px;
            pointer-events: none;
            transition: color 0.3s;
        }

        .login-input-wrapper .input-icon svg {
            width: 18px;
            height: 18px;
        }

        .login-input {
            width: 100%;
            height: 46px;
            padding: 0 14px 0 44px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            font-size: 15px;
            color: #262626;
            background: #fafafa;
            transition: all 0.3s;
        }

        .login-input:hover {
            border-color: #52c41a;
            background: #fff;
        }

        .login-input:focus {
            border-color: #52c41a;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(82, 196, 26, 0.12);
        }

        .login-input:focus + .input-icon,
        .login-input:focus ~ .input-icon {
            color: #52c41a;
        }

        .login-input::placeholder {
            color: #bfbfbf;
        }

        .login-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .login-options .checkbox-group {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .login-options .pos-checkbox {
            font-size: 13px;
        }

        .login-options .forgot-link {
            font-size: 13px;
            color: #52c41a;
            cursor: pointer;
            transition: color 0.3s;
        }

        .login-options .forgot-link:hover {
            color: #389e0d;
        }

        .login-btn {
            width: 100%;
            height: 48px;
            background: linear-gradient(135deg, #52c41a, #389e0d);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(82, 196, 26, 0.35);
        }

        .login-btn:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(82, 196, 26, 0.25);
        }

        .login-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .login-btn:active::after {
            width: 300px;
            height: 300px;
        }

        .login-footer {
            padding: 20px 40px 28px;
            text-align: center;
        }

        .login-copyright {
            font-size: 12px;
            color: #bfbfbf;
            line-height: 1.8;
        }

        /* Security hint */
        .login-security {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 16px;
            font-size: 12px;
            color: #bfbfbf;
        }

        .login-security svg {
            width: 14px;
            height: 14px;
            fill: #bfbfbf;
        }

        /* Responsive */
        @media screen and (max-width: 480px) {
            .login-header {
                padding: 32px 24px 20px;
            }
            .login-body {
                padding: 8px 24px 24px;
            }
            .login-footer {
                padding: 16px 24px 24px;
            }
            .login-title {
                font-size: 18px;
            }
            .login-options {
                flex-direction: column;
                gap: 12px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <!-- Floating Particles -->
        <div class="login-particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>

        <!-- Login Card -->
        <div class="login-container">
            <div class="login-card">
                <!-- Header -->
                <div class="login-header">
                    <div class="login-logo">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2h1v6h10v-6h4v6h2v-6h1zm-9 4H6v-4h6v4z"/>
                        </svg>
                    </div>
                    <h1 class="login-title">智慧新零售云POS综合管理平台</h1>
                    <p class="login-subtitle">龙岩星链星河文化科技有限公司</p>
                </div>

                <!-- Body -->
                <div class="login-body">
                    <form id="loginForm" onsubmit="return false;">
                        <!-- Username -->
                        <div class="login-form-group">
                            <label>用户名</label>
                            <div class="login-input-wrapper">
                                <input type="text" class="login-input" id="username" value="admin" placeholder="请输入用户名" autocomplete="username">
                                <span class="input-icon">
                                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                                </span>
                            </div>
                        </div>

                        <!-- Password -->
                        <div class="login-form-group">
                            <label>密码</label>
                            <div class="login-input-wrapper">
                                <input type="password" class="login-input" id="password" value="88888888" placeholder="请输入密码" autocomplete="current-password">
                                <span class="input-icon">
                                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                                </span>
                            </div>
                        </div>

                        <!-- Options -->
                        <div class="login-options">
                            <div class="checkbox-group">
                                <label class="pos-checkbox">
                                    <input type="checkbox" checked> 记住密码
                                </label>
                                <label class="pos-checkbox">
                                    <input type="checkbox"> 自动登录
                                </label>
                            </div>
                            <a class="forgot-link" href="javascript:void(0);">忘记密码?</a>
                        </div>

                        <!-- Login Button -->
                        <button type="submit" class="login-btn" onclick="handleLogin()">登 录</button>
                    </form>
                </div>

                <!-- Footer -->
                <div class="login-footer">
                    <div class="login-copyright">
                        &copy; 2025 智慧新零售云POS综合管理平台 V1.0
                    </div>
                    <div class="login-security">
                        <svg viewBox="0 0 24 24"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                        <span>SSL安全加密传输</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (!username) {
                showTip('请输入用户名');
                return;
            }
            if (!password) {
                showTip('请输入密码');
                return;
            }

            // Simulate login
            const btn = document.querySelector('.login-btn');
            btn.textContent = '登录中...';
            btn.style.opacity = '0.8';
            btn.disabled = true;

            setTimeout(function() {
                window.location.href = 'pos-main-dashboard.html';
            }, 800);
        }

        function showTip(msg) {
            const existing = document.querySelector('.login-tip');
            if (existing) existing.remove();

            const tip = document.createElement('div');
            tip.className = 'login-tip';
            tip.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#ff4d4f;color:#fff;padding:10px 24px;border-radius:6px;font-size:14px;z-index:9999;animation:fadeIn 0.3s ease;';
            tip.textContent = msg;
            document.body.appendChild(tip);

            setTimeout(function() {
                tip.style.opacity = '0';
                tip.style.transition = 'opacity 0.3s';
                setTimeout(function() { tip.remove(); }, 300);
            }, 2000);
        }

        // Enter key support
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>
