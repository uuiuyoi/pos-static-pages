<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 跨境云商综合管理平台</title>
    <link rel="stylesheet" href="pos-common.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; font-family: var(--font-family); }

        .login-page {
            display: flex;
            min-height: 100vh;
        }

        /* ========== Left Side - Background Image ========== */
        .login-left {
            flex: 1;
            background: url('assets/cross-border-bg.jpg') center/cover no-repeat;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px 80px 60px;
        }

        .login-left::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg,
                rgba(0,20,40,0.80) 0%,
                rgba(0,40,60,0.55) 40%,
                rgba(0,20,40,0.70) 100%
            );
        }

        /* Decorative globe grid overlay */
        .login-left::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 30% 60%, rgba(0,150,255,0.06) 0%, transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(0,200,255,0.04) 0%, transparent 40%),
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .login-brand {
            position: relative;
            z-index: 2;
            color: #fff;
            max-width: 560px;
        }

        .login-brand .brand-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #1890ff, #096dd9);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            box-shadow: 0 8px 32px rgba(24, 144, 255, 0.4);
        }

        .login-brand .brand-logo svg { width: 34px; height: 34px; fill: #fff; }

        .login-brand h1 {
            font-size: 38px;
            font-weight: 700;
            margin-bottom: 16px;
            text-shadow: 0 2px 16px rgba(0,0,0,0.6);
            letter-spacing: 2px;
        }

        .login-brand .brand-subtitle {
            font-size: 18px;
            font-weight: 400;
            opacity: 0.95;
            margin-bottom: 12px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        .login-brand .brand-desc {
            font-size: 15px;
            opacity: 0.95;
            line-height: 1.8;
            max-width: 480px;
            text-shadow: 0 1px 8px rgba(0,0,0,0.4);
            margin-bottom: 20px;
        }

        .login-brand .brand-highlights {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px 24px;
            margin-top: 12px;
            margin-bottom: 28px;
        }

        .login-brand .brand-highlights .hl-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            opacity: 0.9;
            padding: 8px 12px;
            background: rgba(255,255,255,0.08);
            border-radius: 8px;
            backdrop-filter: blur(4px);
        }

        .login-brand .brand-highlights .hl-item svg {
            width: 18px;
            height: 18px;
            fill: #40a9ff;
            flex-shrink: 0;
        }

        .login-brand .brand-stats {
            display: flex;
            gap: 32px;
            padding: 20px 24px;
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            backdrop-filter: blur(6px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .login-brand .brand-stats .stat-item {
            text-align: center;
        }

        .login-brand .brand-stats .stat-item .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #40a9ff;
        }

        .login-brand .brand-stats .stat-item .stat-label {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .login-brand .brand-stats .stat-divider {
            width: 1px;
            background: rgba(255,255,255,0.15);
        }

        .login-brand .brand-features {
            display: flex;
            gap: 28px;
            margin-top: 16px;
        }

        .login-brand .brand-features .feature-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            opacity: 0.8;
        }

        .login-brand .brand-features .feature-item svg {
            width: 18px;
            height: 18px;
            fill: #40a9ff;
        }

        /* ========== Right Side - Login Form ========== */
        .login-right {
            width: 480px;
            min-width: 420px;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 48px;
            position: relative;
        }

        .login-card {
            width: 100%;
            max-width: 380px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h2 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .login-header p {
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .login-form-group {
            margin-bottom: 20px;
        }

        .login-form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .login-input-wrapper {
            position: relative;
        }

        .login-input-wrapper .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-disabled);
            pointer-events: none;
            transition: color 0.3s;
        }

        .login-input-wrapper .input-icon svg { width: 18px; height: 18px; }

        .login-input {
            width: 100%;
            height: 44px;
            padding: 0 12px 0 42px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            color: var(--text-primary);
            background: #fafafa;
            transition: all 0.3s;
        }

        .login-input:hover, .login-input:focus {
            border-color: #1890ff;
            background: #fff;
            outline: none;
        }

        .login-input:focus {
            box-shadow: 0 0 0 3px rgba(24, 144, 255, 0.12);
        }

        .login-input:focus + .input-icon { color: #1890ff; }

        .login-input::placeholder { color: var(--text-disabled); }

        /* 验证码 */
        .captcha-row {
            display: flex;
            gap: 10px;
        }

        .captcha-row .login-input {
            flex: 1;
        }

        .captcha-img {
            width: 110px;
            height: 44px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            user-select: none;
            transition: border-color 0.3s;
        }

        .captcha-img:hover { border-color: #1890ff; }

        .captcha-img canvas { width: 100%; height: 100%; }

        /* 选项行 */
        .login-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .login-options .pos-checkbox {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .login-options .pos-checkbox input {
            width: 16px;
            height: 16px;
            accent-color: #1890ff;
            cursor: pointer;
        }

        .login-options .forgot-link {
            font-size: 13px;
            color: #1890ff;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
            transition: color 0.3s;
        }

        .login-options .forgot-link:hover { color: #096dd9; text-decoration: underline; }

        /* 登录按钮 */
        .login-btn {
            width: 100%;
            height: 46px;
            background: linear-gradient(135deg, #1890ff, #096dd9);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 2px;
        }

        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(24, 144, 255, 0.35);
        }

        .login-btn:active { transform: translateY(0); }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* 注册/其他 */
        .login-extra {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: var(--text-tertiary);
        }

        .login-extra a {
            color: #1890ff;
            cursor: pointer;
            text-decoration: none;
        }

        .login-extra a:hover { text-decoration: underline; }

        /* 底部 */
        .login-footer {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 12px;
            color: var(--text-disabled);
        }

        /* ========== Modal ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .modal-overlay.show { display: flex; opacity: 1; }

        .modal-box {
            background: #fff;
            border-radius: 12px;
            width: 420px;
            max-width: 92vw;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            transform: translateY(-20px);
            transition: transform 0.3s;
            overflow: hidden;
        }

        .modal-overlay.show .modal-box { transform: translateY(0); }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color-light);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .modal-close {
            width: 28px;
            height: 28px;
            border: none;
            background: none;
            border-radius: 6px;
            cursor: pointer;
            color: var(--text-tertiary);
            font-size: 20px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: var(--body-bg);
            color: var(--text-primary);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color-light);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .modal-btn {
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.3s;
        }

        .modal-btn-default {
            background: #fff;
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        .modal-btn-default:hover { border-color: #1890ff; color: #1890ff; }

        .modal-btn-primary {
            background: #1890ff;
            border-color: #1890ff;
            color: #fff;
        }
        .modal-btn-primary:hover { background: #40a9ff; border-color: #40a9ff; }

        /* ========== Toast ========== */
        .login-toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            color: #fff;
            z-index: 9999;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }

        .login-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .login-toast.error { background: var(--error-color); }
        .login-toast.success { background: var(--success-color); }
        .login-toast.info { background: var(--info-color); }

        /* Responsive */
        @media screen and (max-width: 900px) {
            .login-left { display: none; }
            .login-right { width: 100%; min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <!-- 左侧背景 + 品牌 -->
        <div class="login-left">
            <div class="login-brand">
                <div class="brand-logo">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                    </svg>
                </div>
                <h1>跨境云商综合管理平台</h1>
                <div class="brand-subtitle">全球贸易 · 智慧互联</div>
                <div class="brand-desc">
                    一站式跨境电商综合管理平台，整合全球商品采购、跨境物流追踪、<br>
                    多币种结算、海关报关、海外仓管理等核心业务模块，助力中国品牌扬帆出海。
                </div>

                <div class="brand-highlights">
                    <div class="hl-item">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                        <span>覆盖全球200+国家和地区贸易网络</span>
                    </div>
                    <div class="hl-item">
                        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
                        <span>国际支付与多币种结算安全保障</span>
                    </div>
                    <div class="hl-item">
                        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
                        <span>智能报关与全链路物流实时追踪</span>
                    </div>
                    <div class="hl-item">
                        <svg viewBox="0 0 24 24"><path d="M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2h1v6h10v-6h4v6h2v-6h1zm-9 4H6v-4h6v4z"/></svg>
                        <span>海外仓管理 + 本地化运营一站式服务</span>
                    </div>
                </div>

                <div class="brand-stats">
                    <div class="stat-item">
                        <div class="stat-number">200+</div>
                        <div class="stat-label">覆盖国家</div>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <div class="stat-number">50万+</div>
                        <div class="stat-label">跨境商户</div>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <div class="stat-number">99.5%</div>
                        <div class="stat-label">通关成功率</div>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <div class="stat-number">24/7</div>
                        <div class="stat-label">全球客服</div>
                    </div>
                </div>

                <div class="brand-features">
                    <div class="feature-item">
                        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                        <span>全球采购</span>
                    </div>
                    <div class="feature-item">
                        <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM9 17H7v-7h2v7zm4 0h-2V7h2v10zm4 0h-2v-4h2v4z"/></svg>
                        <span>数据分析</span>
                    </div>
                    <div class="feature-item">
                        <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
                        <span>全球营销</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧登录表单 -->
        <div class="login-right">
            <div class="login-card">
                <div class="login-header">
                    <h2>欢迎登录</h2>
                    <p>跨境云商综合管理平台</p>
                </div>

                <form id="loginForm" onsubmit="return false;">
                    <!-- 用户名 -->
                    <div class="login-form-group">
                        <label>用户名</label>
                        <div class="login-input-wrapper">
                            <input type="text" class="login-input" id="username" value="admin" placeholder="请输入用户名" autocomplete="username">
                            <span class="input-icon">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                            </span>
                        </div>
                    </div>

                    <!-- 密码 -->
                    <div class="login-form-group">
                        <label>密码</label>
                        <div class="login-input-wrapper">
                            <input type="password" class="login-input" id="password" value="88888888" placeholder="请输入密码" autocomplete="current-password">
                            <span class="input-icon">
                                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                            </span>
                        </div>
                    </div>

                    <!-- 图形验证码 -->
                    <div class="login-form-group">
                        <label>验证码</label>
                        <div class="captcha-row">
                            <input type="text" class="login-input" id="captchaInput" placeholder="请输入验证码" maxlength="4" autocomplete="off">
                            <div class="captcha-img" id="captchaBox" title="点击刷新验证码" onclick="refreshCaptcha()">
                                <canvas id="captchaCanvas" width="110" height="44"></canvas>
                            </div>
                        </div>
                    </div>

                    <!-- 选项 -->
                    <div class="login-options">
                        <label class="pos-checkbox">
                            <input type="checkbox" id="rememberMe" checked> 记住密码
                        </label>
                        <button type="button" class="forgot-link" onclick="openForgotModal()">忘记密码？</button>
                    </div>

                    <!-- 登录按钮 -->
                    <button type="submit" class="login-btn" id="loginBtn" onclick="handleLogin()">登 录</button>
                </form>

                <div class="login-extra">
                    还没有账号？<a>请联系管理员开通</a>
                </div>
            </div>

            <div class="login-footer">
                &copy; 2025 跨境云商综合管理平台 V2.0 | 全球贸易 · 智慧互联
            </div>
        </div>
    </div>

    <!-- 忘记密码弹窗 -->
    <div class="modal-overlay" id="forgotModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3>重置密码</h3>
                <button class="modal-close" onclick="closeForgotModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="login-form-group">
                    <label>用户名 / 邮箱</label>
                    <div class="login-input-wrapper">
                        <input type="text" class="login-input" id="forgotUser" placeholder="请输入用户名或注册邮箱" style="padding-left: 12px;">
                    </div>
                </div>
                <div class="login-form-group">
                    <label>新密码</label>
                    <div class="login-input-wrapper">
                        <input type="password" class="login-input" id="forgotNewPwd" placeholder="请输入新密码（至少8位）" style="padding-left: 12px;">
                    </div>
                </div>
                <div class="login-form-group">
                    <label>确认新密码</label>
                    <div class="login-input-wrapper">
                        <input type="password" class="login-input" id="forgotConfirmPwd" placeholder="请再次输入新密码" style="padding-left: 12px;">
                    </div>
                </div>
                <div class="login-form-group">
                    <label>邮箱验证码</label>
                    <div class="captcha-row">
                        <input type="text" class="login-input" id="forgotSmsCode" placeholder="请输入邮箱验证码" maxlength="6" style="padding-left: 12px;">
                        <button type="button" class="modal-btn modal-btn-default" id="smsBtn" onclick="sendSmsCode()" style="width: 110px; height: 44px; white-space: nowrap;">获取验证码</button>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn modal-btn-default" onclick="closeForgotModal()">取消</button>
                <button class="modal-btn modal-btn-primary" onclick="handleResetPwd()">确认重置</button>
            </div>
        </div>
    </div>

    <script>
        // ========== 图形验证码 ==========
        let captchaCode = '';

        function randomColor(min, max) {
            const r = Math.floor(Math.random() * (max - min) + min);
            const g = Math.floor(Math.random() * (max - min) + min);
            const b = Math.floor(Math.random() * (max - min) + min);
            return 'rgb(' + r + ',' + g + ',' + b + ')';
        }

        function refreshCaptcha() {
            const canvas = document.getElementById('captchaCanvas');
            const ctx = canvas.getContext('2d');
            const w = canvas.width;
            const h = canvas.height;

            ctx.fillStyle = '#f5f5f5';
            ctx.fillRect(0, 0, w, h);

            for (let i = 0; i < 6; i++) {
                ctx.strokeStyle = randomColor(150, 220);
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(Math.random() * w, Math.random() * h);
                ctx.lineTo(Math.random() * w, Math.random() * h);
                ctx.stroke();
            }

            for (let i = 0; i < 30; i++) {
                ctx.fillStyle = randomColor(150, 220);
                ctx.beginPath();
                ctx.arc(Math.random() * w, Math.random() * h, 1, 0, 2 * Math.PI);
                ctx.fill();
            }

            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            const fontSize = 22;
            ctx.font = 'bold ' + fontSize + 'px Arial';
            ctx.textBaseline = 'middle';
            for (let i = 0; i < 4; i++) {
                const char = chars[Math.floor(Math.random() * chars.length)];
                code += char;
                ctx.fillStyle = randomColor(50, 120);
                ctx.save();
                const x = 18 + i * 22;
                const y = h / 2 + Math.random() * 6 - 3;
                const angle = Math.random() * 0.4 - 0.2;
                ctx.translate(x, y);
                ctx.rotate(angle);
                ctx.fillText(char, 0, 0);
                ctx.restore();
            }
            captchaCode = code;
        }

        // ========== 登录 ==========
        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const captchaInput = document.getElementById('captchaInput').value.trim().toUpperCase();
            const btn = document.getElementById('loginBtn');

            if (!username) { showToast('请输入用户名', 'error'); return; }
            if (!password) { showToast('请输入密码', 'error'); return; }
            if (!captchaInput) { showToast('请输入验证码', 'error'); return; }
            if (captchaInput !== captchaCode) { showToast('验证码错误，请重新输入', 'error'); refreshCaptcha(); document.getElementById('captchaInput').value = ''; return; }

            btn.textContent = '登录中...';
            btn.disabled = true;

            setTimeout(function() {
                showToast('登录成功，正在跳转...', 'success');
                setTimeout(function() {
                    window.location.href = 'pos-main-dashboard.html';
                }, 600);
            }, 800);
        }

        // ========== 忘记密码弹窗 ==========
        function openForgotModal() {
            document.getElementById('forgotModal').classList.add('show');
        }

        function closeForgotModal() {
            document.getElementById('forgotModal').classList.remove('show');
            document.getElementById('forgotUser').value = '';
            document.getElementById('forgotNewPwd').value = '';
            document.getElementById('forgotConfirmPwd').value = '';
            document.getElementById('forgotSmsCode').value = '';
        }

        let smsCountdown = 0;
        function sendSmsCode() {
            const user = document.getElementById('forgotUser').value.trim();
            if (!user) { showToast('请输入用户名或邮箱', 'error'); return; }

            if (smsCountdown > 0) return;
            const btn = document.getElementById('smsBtn');
            smsCountdown = 60;
            btn.textContent = smsCountdown + 's';
            btn.disabled = true;
            btn.style.opacity = '0.6';
            showToast('验证码已发送至您的注册邮箱', 'success');

            const timer = setInterval(function() {
                smsCountdown--;
                if (smsCountdown <= 0) {
                    clearInterval(timer);
                    btn.textContent = '获取验证码';
                    btn.disabled = false;
                    btn.style.opacity = '1';
                } else {
                    btn.textContent = smsCountdown + 's';
                }
            }, 1000);
        }

        function handleResetPwd() {
            const user = document.getElementById('forgotUser').value.trim();
            const newPwd = document.getElementById('forgotNewPwd').value;
            const confirmPwd = document.getElementById('forgotConfirmPwd').value;
            const smsCode = document.getElementById('forgotSmsCode').value.trim();

            if (!user) { showToast('请输入用户名或邮箱', 'error'); return; }
            if (!newPwd || newPwd.length < 8) { showToast('新密码至少8位', 'error'); return; }
            if (newPwd !== confirmPwd) { showToast('两次输入的密码不一致', 'error'); return; }
            if (!smsCode || smsCode.length < 4) { showToast('请输入邮箱验证码', 'error'); return; }

            showToast('密码重置成功，请使用新密码登录', 'success');
            closeForgotModal();
        }

        // ========== Toast ==========
        function showToast(msg, type) {
            const existing = document.querySelector('.login-toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.className = 'login-toast ' + type;
            toast.textContent = msg;
            document.body.appendChild(toast);

            requestAnimationFrame(function() {
                toast.classList.add('show');
            });

            setTimeout(function() {
                toast.classList.remove('show');
                setTimeout(function() { toast.remove(); }, 300);
            }, 2500);
        }

        // ========== Enter键 ==========
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('forgotModal').classList.contains('show')) {
                    handleResetPwd();
                } else {
                    handleLogin();
                }
            }
        });

        // 初始化验证码
        refreshCaptcha();
    </script>
</body>
</html>
