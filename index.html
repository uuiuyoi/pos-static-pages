<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=pos-login.html">
    <title>智慧新零售云POS综合管理平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .redirect-box {
            text-align: center;
            padding: 48px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            max-width: 420px;
            width: 90%;
        }
        .redirect-box h1 {
            font-size: 20px;
            color: #1a1a2e;
            margin-bottom: 12px;
        }
        .redirect-box p {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .redirect-box a {
            display: inline-block;
            padding: 10px 32px;
            background: #1677ff;
            color: #fff;
            text-decoration: none;
            border-radius: 6px;
            font-size: 14px;
            transition: background 0.2s;
        }
        .redirect-box a:hover {
            background: #4096ff;
        }
    </style>
</head>
<body>
    <div class="redirect-box">
        <h1>智慧新零售云POS综合管理平台</h1>
        <p>正在跳转到登录页面...</p>
        <a href="pos-login.html">如果没有自动跳转，请点击这里</a>
    </div>
</body>
</html>
